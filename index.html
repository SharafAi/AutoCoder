<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="coinzilla" content="0db8154c99ce9b04b03accb17b69c4e5" />
  <title>AutoCoder - Productivity Reimagined</title>
  <style>
    :root {
      --bg-color: #0f1115;
      --panel-bg: #1e1e1e;
      --panel-border: rgba(255, 255, 255, 0.1);
      --text-main: #e0e0e0;
      --text-dim: #858585;
      --accent: #4a4a4a;
      --btn-bg: #333333;
    }

    body {
      margin: 0;
      padding: 0;
      background-color: var(--bg-color);
      color: var(--text-main);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    /* The Main Panel Mockup */
    .container {
      width: 380px;
      background: var(--panel-bg);
      border-radius: 12px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
      border: 1px solid var(--panel-border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Header section */
    .header {
      padding: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header-left {
      font-weight: 600;
      font-size: 14px;
    }

    .header-right {
      display: flex;
      gap: 12px;
      color: var(--text-dim);
    }

    /* Content section */
    .content {
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .field-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .label {
      font-size: 10px;
      font-weight: 700;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .value {
      font-size: 13px;
      font-weight: 600;
    }

    textarea {
      width: 100%;
      height: 120px;
      background: transparent;
      border: 1px solid var(--panel-border);
      border-radius: 6px;
      padding: 12px;
      color: var(--text-main);
      font-size: 12px;
      resize: none;
      box-sizing: border-box;
    }

    /* Button row */
    .button-row {
      display: flex;
      gap: 10px;
    }

    .btn {
      flex: 1;
      padding: 10px;
      border-radius: 6px;
      border: none;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-main);
      background: var(--btn-bg);
      cursor: pointer;
      text-align: center;
    }

    /* Ad Section */
    .ad-section {
      padding: 12px 16px;
      background: #151516;
      border-top: 1px solid var(--panel-border);
    }

    .ad-label {
      font-size: 9px;
      font-weight: 700;
      color: var(--text-dim);
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    iframe {
      width: 100%;
      height: 50px;
      border: none;
      background: #ffffff;
      border-radius: 4px;
    }

    .background-glow {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: radial-gradient(circle at 50% 50%, #1c1f26 0%, #0f1115 100%);
      z-index: -1;
    }
  </style>
</head>

<body>
  <div class="background-glow"></div>

  <div class="container">
    <!-- Header -->
    <div class="header">
      <div class="header-left">AutoCoder</div>
      <div class="header-right">
        <span>✦</span>
        <span>⚙</span>
        <span>✕</span>
      </div>
    </div>

    <!-- Main Content -->
    <div class="content">
      <div class="field-group">
        <div class="label">Current Container</div>
        <div class="value">Waiting...</div>
      </div>

      <div class="field-group">
        <div class="label">Code</div>
        <div class="value">L</div>
      </div>

      <textarea placeholder="Paste containers here..."></textarea>

      <div class="button-row">
        <div class="btn">Start Automation</div>
        <div class="btn">Clear</div>
      </div>
    </div>

    <!-- Ad Section -->
    <div class="ad-section">
      <div class="ad-label">Sponsored 1</div>
      <iframe data-aa='2430155' src='https://ad.a-ads.com/2430155?size=320x50' scrolling="no"></iframe>
      <div class="ad-label" style="margin-top: 10px;">Sponsored 2</div>
      <iframe data-aa='2430163' src='https://ad.a-ads.com/2430163?size=320x50' scrolling="no"></iframe>
    </div>
  </div>
</body>

</html>
